# Region OT — the IT→OT bypass case (Gate 6).
#
# A water utility's plant SCADA depends DIRECTLY on a cloud setpoint-management
# SaaS sitting in enterprise IT (Purdue L4) — a raw L2->L4 dependency with no
# IDMZ broker on the path. When the vendor is breached, the cascade crosses
# straight into essential OT and the plant breaches its mandated ride-through.
# This is the Stuxnet-shaped coupling the gate exists to surface:
# violates_purdue_direct = true, driven by a high-NIS2 vendor.
#
# Compare region_ot_brokered.yaml: identical topology and timing, but a DMZ
# historian (L3.5) is inserted on the path, so the same cascade produces two
# touches_dmz edges and ZERO Purdue violations. That pair proves the split is
# real, not cosmetic.
#
# Edge direction: `from` depends on `to`.

nodes:
  - id: vendor_cloud_setpoints
    label: "Cloud setpoint-management SaaS (enterprise IT)"
    sector: digital
    purdue_level: 4
    criticality: important
    autonomy_minutes: 0
    nis2_vendor_score: 8.8      # breach history, weak audit — high-risk on paper

  - id: plant_scada
    label: "Water plant SCADA / supervisory control"
    sector: water
    purdue_level: 2
    criticality: essential
    autonomy_minutes: [20, 40]  # runs on last setpoints; midpoint = 30
    required_ride_through_min: 60

  - id: plc_dosing
    label: "Chemical dosing PLC"
    sector: water
    purdue_level: 1
    criticality: important
    autonomy_minutes: [5, 15]   # midpoint = 10

edges:
  - from: plant_scada
    to: vendor_cloud_setpoints
    type: data
    redundancy: 0
    note: "raw L2->L4 setpoint pull — no IDMZ broker on the path (the bypass)"

  - from: plc_dosing
    to: plant_scada
    type: data
    redundancy: 0
    note: "dosing setpoints from SCADA; loses control when SCADA goes blind"
