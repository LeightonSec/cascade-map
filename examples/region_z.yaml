# Region Z — the richer disagreement case: the vendor scorecard and the
# dependency graph point at DIFFERENT suppliers, at scale.
#
# The highest-scored vendor (cloud ERP, 9.2 — breach history, weak audit) is
# completely isolated: no edges in or out, lose it and nothing else falls.
# The regional fibre backhaul scores a mid-table 5.5 (small operator, tidy
# paperwork), but it is the single choke point under the water utility's
# telemetry, the mobile core, AND the substation SCADA gateway: lose it and
# water treatment goes blind within the hour, card payments follow when the
# mobile core's batteries drain.
#
# Same schema as region_y.yaml. Edge direction: `from` depends on `to`.
# All edges are `type: data` on purpose — data derives failure kind
# control_loss (node keeps running, blind on last setpoints / no telemetry);
# any other type derives physical (node stops), which would contradict the
# scenario.

nodes:
  - id: erp_billing_saas
    label: "Cloud ERP / billing platform"
    sector: digital
    criticality: important
    autonomy_minutes: 0
    nis2_vendor_score: 9.2       # highest-risk on paper — zero downstream, the survivor

  - id: fibre_backhaul_z
    label: "Regional fibre backhaul (single route)"
    sector: telecom
    criticality: important
    autonomy_minutes: 0          # the injected failure
    nis2_vendor_score: 5.5       # mid-table on paper — the actual choke point

  - id: water_treatment_plant
    label: "Water treatment plant (SCADA telemetry)"
    sector: water
    criticality: essential
    autonomy_minutes: [30, 90]   # runs blind on last setpoints; midpoint = 60

  - id: mobile_core_region_z
    label: "Mobile core network (Region Z)"
    sector: telecom
    criticality: important
    autonomy_minutes: [120, 360] # battery + diesel; midpoint = 240
    nis2_vendor_score: 7.5

  - id: card_payment_switch
    label: "Card payment switch"
    sector: finance
    criticality: important
    autonomy_minutes: 0          # no independent buffer; needs the mobile core

  - id: pos_acquirer_gateway
    label: "POS acquirer gateway"
    sector: finance
    criticality: important
    autonomy_minutes: 0

  - id: atm_network_region_z
    label: "ATM network (Region Z)"
    sector: finance
    criticality: important
    autonomy_minutes: 0

  - id: emergency_dispatch_console
    label: "Emergency dispatch console (non-999 ops)"
    sector: public_safety
    criticality: important       # deliberately `important`, NOT essential: this is a
                                 # back-office ops console, not the 999 call path.
                                 # Marking it essential would make the mobile core a
                                 # second red line and dilute the single-choke-point story.
    autonomy_minutes: 0

  - id: substation_scada_gateway
    label: "Substation SCADA telemetry gateway"
    sector: energy
    criticality: important
    autonomy_minutes: 0
    nis2_vendor_score: 6.9

  - id: traffic_mgmt_system
    label: "Urban traffic management system"
    sector: transport
    criticality: important
    autonomy_minutes: [15, 45]   # signals fall back to fixed timing; midpoint = 30

edges:
  - from: water_treatment_plant
    to: fibre_backhaul_z
    type: data
    redundancy: 0

  - from: mobile_core_region_z
    to: fibre_backhaul_z
    type: data
    redundancy: 0

  - from: substation_scada_gateway
    to: fibre_backhaul_z
    type: data
    redundancy: 0

  - from: card_payment_switch
    to: mobile_core_region_z
    type: data
    redundancy: 0

  - from: pos_acquirer_gateway
    to: card_payment_switch
    type: data
    redundancy: 0

  - from: atm_network_region_z
    to: card_payment_switch
    type: data
    redundancy: 0

  - from: emergency_dispatch_console
    to: mobile_core_region_z
    type: data
    redundancy: 0

  - from: traffic_mgmt_system
    to: substation_scada_gateway
    type: data
    redundancy: 0
